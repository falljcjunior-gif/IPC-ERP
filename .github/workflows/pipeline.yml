name: IPC ERP Production Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 🔒 STAGE 1: SECURITY & QUALITY
  check-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci

      - name: Lint Analysis
        run: npm run lint
        
      - name: SAST Security Audit (npm audit)
        run: npm audit --audit-level=high

  # 🧪 STAGE 2: PARANOIAC TESTING
  run-tests:
    needs: check-quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Deps
        run: npm ci
        
      - name: Execute Destructive Test Suite (Vitest)
        run: npm run test

  # 🚀 STAGE 3: BUILD & DEPLOY
  deploy-to-production:
    needs: run-tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          
      - name: Install Deps
        run: npm ci
        
      - name: Build Immersive Frontend
        run: npm run build
        
      - name: Deploy to Firebase (Hosting, Rules, Functions)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_IPC_ERP }}'
          channelId: live
          projectId: ipc-erp
