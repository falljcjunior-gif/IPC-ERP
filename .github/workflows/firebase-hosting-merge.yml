# This file was auto-generated by the Firebase CLI
# https://github.com/firebase/firebase-tools

name: Deploy to Firebase Hosting on merge
on:
  push:
    branches:
      - main
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
      - name: Install dependencies (Client)
        run: npm ci
      - name: Build Client
        run: npm run build
      - name: Install dependencies (Functions)
        run: cd functions && npm ci
      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_IPC_ERP }}
      - name: Deploy to Firebase
        run: |
          npx firebase-tools deploy --project ipc-erp --non-interactive --force \
            2>&1 | tee /tmp/firebase_deploy.log
          echo "FIREBASE_EXIT=${PIPESTATUS[0]}" >> "$GITHUB_ENV"
        continue-on-error: true
        id: firebase_deploy

      - name: Fix IAM — nexusChat invoker (Cloud Run Gen 2)
        run: |
          gcloud run services add-iam-policy-binding nexuschat \
            --region=us-central1 \
            --member=allUsers \
            --role=roles/run.invoker \
            --project=ipc-erp \
            --quiet || echo "IAM already set or skipped"

      - name: Fix IAM — verifyrecaptcha invoker (Cloud Run Gen 2)
        run: |
          gcloud run services add-iam-policy-binding verifyrecaptcha \
            --region=europe-west1 \
            --member=allUsers \
            --role=roles/run.invoker \
            --project=ipc-erp \
            --quiet || echo "IAM already set or skipped"

      - name: Fix IAM — admin callables invoker (europe-west1)
        run: |
          for svc in provisionuser updateuserpermissions deleteuseraccount; do
            gcloud run services add-iam-policy-binding $svc \
              --region=europe-west1 \
              --member=allUsers \
              --role=roles/run.invoker \
              --project=ipc-erp \
              --quiet || echo "IAM already set or skipped for $svc"
          done

      - name: Fix IAM — Missions Butler callables + schedulers (us-central1)
        run: |
          for svc in \
            missionsdeadlinescanner \
            missionsweeklyreport \
            missionsresetduesoonflags \
            savemissionsbutlerrule \
            deletemissionsbutlerrule \
            executemissionsbutlerrule \
            onmissionscardmoved \
            onmissionscardcreated; do
            gcloud run services add-iam-policy-binding $svc \
              --region=us-central1 \
              --member=allUsers \
              --role=roles/run.invoker \
              --project=ipc-erp \
              --quiet || echo "IAM already set or skipped for $svc"
          done

      - name: Fix IAM — Le Commandant callable (us-central1)
        run: |
          gcloud run services add-iam-policy-binding commanderchat \
            --region=us-central1 \
            --member=allUsers \
            --role=roles/run.invoker \
            --project=ipc-erp \
            --quiet || echo "IAM already set or skipped for commanderchat"

      - name: Fix IAM — Nexus Score Engine callables (us-central1)
        run: |
          gcloud run services add-iam-policy-binding computenexusscoresnow \
            --region=us-central1 \
            --member=allUsers \
            --role=roles/run.invoker \
            --project=ipc-erp \
            --quiet || echo "IAM already set or skipped for computenexusscoresnow"

      - name: Fail if deploy failed (non-IAM error)
        if: steps.firebase_deploy.outcome == 'failure'
        run: |
          # All "Failed to set invoker / IAM Policy" errors are handled by the gcloud steps above.
          # Only fail if there is an error that is NOT an invoker/IAM issue.
          NON_IAM=$(grep -iE "^.*(Error|error):" /tmp/firebase_deploy.log \
            | grep -ivE "invoker|iam.?policy|set.*iam|iam.*set" || true)
          if [ -n "$NON_IAM" ]; then
            echo "Non-IAM deploy error detected:"
            echo "$NON_IAM"
            exit 1
          else
            echo "Only IAM/invoker errors — handled by gcloud steps above. Deploy OK."
          fi
